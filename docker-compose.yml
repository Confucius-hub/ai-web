# ============================================================
# # Реализована оркестрация в Docker Compose
# Один файл -> docker compose up --build -d
# ============================================================

# # Разделение сетей (Networks)
# frontend_net:  proxy <-> ui <-> api    (внешний трафик + UI)
# backend_net:   api <-> redis <-> celery <-> postgres   (UI и proxy сюда не лезут)
# monitoring_net: prometheus <-> grafana <-> api (только для скрейпинга)
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  monitoring_net:
    driver: bridge

# # Управление постоянством данных — volumes для БД, кэша Redis, весов модели
volumes:
  postgres_data:
  redis_data:
  model_weights:
  prometheus_data:
  grafana_data:

services:
  # ----------------------------------------------------------
  # PostgreSQL
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ai-web-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_web_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    # # Compose Healthcheck
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_web_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ----------------------------------------------------------
  # Redis (Celery broker + cache + Pub/Sub)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ai-web-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    # # Compose Healthcheck
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ----------------------------------------------------------
  # Alembic migrations runner (one-shot)
  # ----------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ai-web-migrate
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_web_db}
    command: ["alembic", "upgrade", "head"]
    networks:
      - backend_net
    # # Умный depends_on — миграция стартует только когда Postgres healthy
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ----------------------------------------------------------
  # API replica A   (# Горизонтальное масштабирование — 2 реплики)
  # ----------------------------------------------------------
  api_a:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ai-web-api-a
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_web_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      # # volume для весов моделей — обе реплики используют один и тот же ONNX
      - model_weights:/app/models
    networks:
      - backend_net
      - frontend_net
      - monitoring_net
    # # Умный depends_on
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # # Compose Healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # # Graceful Shutdown
    stop_grace_period: 25s

  api_b:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ai-web-api-b
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_web_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - model_weights:/app/models
    networks:
      - backend_net
      - frontend_net
      - monitoring_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 25s

  # ----------------------------------------------------------
  # Celery worker   (# Асинхронная очередь задач)
  # ----------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    # container_name нельзя при replicas > 1 — compose сам сгенерирует имена
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_web_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    networks:
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # # Graceful Shutdown — worker_shutdown_timeout=30 в celery_app.py
    stop_grace_period: 35s
    # # Горизонтальное масштабирование — параметр для compose v3
    deploy:
      replicas: 2

  # ----------------------------------------------------------
  # Streamlit UI
  # ----------------------------------------------------------
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: ai-web-ui
    restart: unless-stopped
    environment:
      # # Изоляция в сети — UI ходит к API ТОЛЬКО через nginx
      API_BASE_URL: http://nginx/api
    networks:
      # UI намеренно НЕ имеет доступа к backend_net — изоляция от БД и Redis
      - frontend_net
    depends_on:
      api_a:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "http://localhost:8501/_stcore/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 15s

  # ----------------------------------------------------------
  # Nginx reverse proxy   (# Единая точка входа)
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: ai-web-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - frontend_net
      - monitoring_net
    depends_on:
      api_a:
        condition: service_healthy
      api_b:
        condition: service_healthy
      ui:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Prometheus   (# Метрики)
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-web-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.external-url=/prometheus/"
      - "--web.route-prefix=/"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring_net
    depends_on:
      api_a:
        condition: service_healthy

  # ----------------------------------------------------------
  # Grafana   (# Метрики — дашборд)
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: ai-web-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring_net
    depends_on:
      - prometheus
