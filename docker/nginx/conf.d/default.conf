# # Балансировка нагрузки — upstream с двумя репликами API
# # Горизонтальное масштабирование: nginx распределяет запросы между api_a и api_b
upstream api_backend {
    least_conn;
    server api_a:8000 max_fails=3 fail_timeout=10s;
    server api_b:8000 max_fails=3 fail_timeout=10s;
}

# # Единая точка входа — пользователь бьётся ТОЛЬКО в порт 80
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 10m;

    # ============================================================
    # # Маршрутизация — /api/* → бэкенд, /metrics → бэкенд
    # ============================================================

    # Prometheus scrape не должен блокироваться rate-лимитом
    location /metrics {
        proxy_pass http://api_backend/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket (статус задачи) — отдельный location чтобы правильно апгрейдить
    location /api/ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # REST API — с rate limit
    location /api/ {
        # # Rate Limiting — не более 5 req/min на IP, burst=3
        limit_req zone=api_limit burst=3 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Prometheus UI (опционально, под /prometheus/)
    location /prometheus/ {
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Grafana (опционально, под /grafana/)
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Grafana требует WebSocket для live-обновлений
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Всё остальное → UI (Streamlit)
    location / {
        proxy_pass http://ui:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
