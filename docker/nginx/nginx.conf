# # Rate Limiting — зона лимита запросов
# 5 запросов в минуту на IP = ~1 раз в 12 секунд
# burst=3 позволяет коротким всплескам не падать сразу
user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # --- Rate limit: 5 req/min per IP ---
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/m;
    limit_req_status 429;

    # Нужно для WebSocket апгрейда
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include /etc/nginx/conf.d/*.conf;
}
