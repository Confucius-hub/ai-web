# # Метрики — Prometheus подтягивает метрики с обеих реплик API
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: ai-web

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api_a:8000
          - api_b:8000
        labels:
          service: api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
